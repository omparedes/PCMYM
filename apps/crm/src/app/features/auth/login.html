<div class="min-h-screen flex items-center justify-center bg-surface-50 dark:bg-surface-950 p-4">
  <div
    class="w-full max-w-sm rounded-xl border border-surface-200 dark:border-surface-800 bg-white dark:bg-surface-900 p-8 shadow-sm"
  >
    <h1 class="text-2xl font-semibold mb-1">PCMYM</h1>
    <p class="text-surface-500 mb-6 text-sm">Inicia sesión para continuar</p>

    <form class="flex flex-col gap-4" (submit)="$event.preventDefault(); onSubmit()">
      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-medium">Email</label>
        <input
          pInputText
          id="email"
          type="email"
          autocomplete="email"
          class="w-full"
          [formField]="loginForm.email"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium">Contraseña</label>
        <input
          pInputText
          id="password"
          type="password"
          autocomplete="current-password"
          class="w-full"
          [formField]="loginForm.password"
        />
      </div>

      @if (errorMsg(); as msg) {
        <p-message severity="error" [text]="msg" />
      }

      <p-button type="submit" label="Entrar" [loading]="loading()" styleClass="w-full" />
    </form>

    <p class="text-xs text-surface-400 mt-6">
      Placeholder de autenticación (Fase 0). Configura Supabase en tu entorno (.env / environments).
    </p>
  </div>
</div>
